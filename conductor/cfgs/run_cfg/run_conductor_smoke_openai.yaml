defaults:
  - override /model_cfg@_global_: qwen3_4bi
  - override /data_cfg@_global_: guf_dataset
  - override /trainer_cfg@_global_: conductor_grpo
  - _self_

model_name_or_path: Qwen/Qwen3-4B
model_args:
  attn_implementation: sdpa
use_peft: true
load_in_4bit: true

router_question_format_style: v1_7c2_2
access_history_type: binary
user_content_format: include_overall_task
model_id_format: numeric
max_prompt_length: 2048
max_agent_tokens: 256
max_completion_length: 128

task_module: guf.tasks.mmlu
task_class: MMLUTask
use_guf: true
training_tasks:
  - mmlu

closed_models:
  - ${oc.env:OPENAI_MODEL_NAME,gpt-5.5-mini}
b200_models: []
b200_ports: {}
servers: ""

train_max_samples: 8
train_batch_size: 2
per_device_train_batch_size: 2
gradient_accumulation_steps: 1
eval_max_samples: 4
max_steps: 1
num_generations: 2
chunk_size: 1
score_repeats: 1
logging_prob: 1.0

use_vllm: false
vllm_mode: colocate
ds3_gather_for_generation: false
bf16: true
tf32: true
gradient_checkpointing: true

format_bonus: 0.0
cost_bonus_weight: 0.0
anthropic_platform: bedrock
gemini_thinking_budget: 128
claude_thinking_budget: 0
gpt_reasoning_effort: minimal

save_strategy: "no"
save_steps: 1000
save_final_model: false
push_to_hub: false
tags:
resume_from:
evaluate_only: false
use_custom_checkpoint: null
call_post_training: null

logging_strategy: steps
logging_steps: 1
report_to: wandb
wandb_project: conductor_smoke
wandb_group_name: training_smoke/qwen3_4b
wandb_run_name: conductor_grpo_mmlu_openai_worker_1step

results_dir: results
exp_name: ${now:%Y.%m.%d}${now:%H%M%S}
output_dir: ${results_dir}/${wandb_group_name}/${wandb_run_name}/${exp_name}

seed: 42

hydra:
  run:
    dir: ${output_dir}
